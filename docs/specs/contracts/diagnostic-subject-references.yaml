schema_version: "0.1"
id: mossignal.diagnostics.subject_references
title: Diagnostic subject references
kind: family
status: reviewed

source_baseline:
  commit: 5491e4993dbc788d5240f62c874db146f07355cc
  working_tree: clean

summary: >-
  Diagnostic subject references identify problem-bearing semantic subjects by
  stable, category-aware identity rather than presentation labels or runtime
  storage positions.

scope:
  includes:
    - the public SubjectRef family and related-subject roles
    - stable identity requirements for diagnostic subjects
    - canonical ordering for the seven initial authored-graph and structural-validation subject variants
  excludes:
    - diagnostic metadata and rendered labels
    - problem codes, evidence, and suggestions
    - provenance records and runtime diagnostic lifecycles

known_uncovered:
  - Canonical payload comparison for SubjectRef variants outside Network, Node, InPort, OutPort, Connection, ExternalInput, and ExternalOutput

aliases:
  - SubjectRef
  - RelatedSubject
  - RelatedSubjectRole
  - GraphSubjectRef

requirements:
  - id: semantic-identity
    kind: semantic
    statement: >-
      Subject references identify semantic subjects, not rendered names, paths,
      dense indices, arena positions, allocation addresses, or hash slots.
    sources: [catalogue-subjects, concrete-subjects]

  - id: required-categories
    kind: public_surface
    statement: >-
      The non-exhaustive SubjectRef family must cover every category listed by
      the concrete API, including authored structural subjects and the specified
      non-structural identities for regions, definitions, policies, schemas,
      revisions, resolved handles, inspection plans, events, persisted artifacts,
      versions, bindings, transactions, and replay artifacts.
    sources: [concrete-subjects]

  - id: stable-structural-keys
    kind: system_effect
    statement: >-
      Authored structural subject variants must use the common stable structural
      keys and preserve signal kind through the applicable erased key family.
    sources:
      - concrete-stable-keys
      - concrete-erased-keys
      - concrete-subjects
      - concrete-shared-identity

  - id: contextual-derived-identities
    kind: semantic
    statement: >-
      Derived or revision-bound subjects must retain the fingerprint, revision,
      digest, range, or other context required by their category-specific
      identity; they must not be replaced with an incrementing generic index.
    sources: [concrete-subjects]

  - id: related-role
    kind: public_surface
    statement: >-
      RelatedSubject pairs one SubjectRef with a typed, non-exhaustive
      RelatedSubjectRole from the concrete role family; related-subject order is
      semantic only when the evidence schema explicitly declares it ordered.
    sources: [catalogue-related, concrete-problems]

  - id: symmetric-conflicting-claims
    kind: prohibition
    statement: >-
      Duplicate-key claimants use the symmetric ConflictingClaim related-subject
      role; discovery-order roles such as first definition and duplicate
      definition are not part of semantic identity or evidence.
    sources: [catalogue-related, catalogue-evidence-families, concrete-problems]

  - id: initial-subject-tags
    kind: semantic
    statement: >-
      The opening diagnostic surface assigns permanent comparison tags Network=0,
      Node=7, InPort=8, OutPort=9, Connection=10, ExternalInput=11, and
      ExternalOutput=12. These tags must never be renumbered and are not persisted
      enum representations.
    sources: [concrete-subjects]

  - id: initial-subject-order
    kind: semantic
    statement: >-
      Two initially supported subject references compare first by their explicit
      comparison tags and then by canonical stable-key order. Erased
      signal-bearing keys compare Level before Pulse and then by underlying stable
      key; the result is independent of Rust discriminants, declaration or
      insertion order, persisted spelling, metadata, labels, debug output, hash
      iteration, dense positions, and private storage identity.
    sources: [concrete-subjects, persistence-order]

  - id: initial-order-scope
    kind: prohibition
    statement: >-
      The initial ordering rule defines comparison only when both operands are
      among the seven initially supported variants. It neither defines payload
      comparison for other SubjectRef variants nor requires a public Ord
      implementation.
    sources: [concrete-subjects]

  - id: initial-order-tests
    kind: verification
    statement: >-
      Tests must verify stable ordering across all seven initial variants,
      including tag-before-payload comparison and Level-before-Pulse erased-key
      comparison, under permutations of construction and discovery order.
    sources: [catalogue-permutation]

implementation_freedom:
  - Private representation and helper types may vary where the concrete API does not fix them.

open_questions: []

