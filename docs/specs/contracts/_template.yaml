schema_version: "0.1"
id: mossignal.<domain>.<subject>
title: <Canonical subject name>
kind: <concept | family | node | artifact | lifecycle | other>
status: draft

source_baseline:
  commit: <git rev-parse HEAD>
  working_tree: clean # or dirty
  # Keep only when relevant governing specs are modified.
  modified_spec_paths:
    - docs/specs/<modified-spec>.md

summary: >-
  <One or two sentences defining the coherent reusable subject.>

# Keep only when it clarifies the reusable subject boundary.
scope:
  includes:
    - <reusable subject responsibility>
  excludes:
    - <adjacent subject owned elsewhere>

# Omit when no specific missing facet is already known.
known_uncovered:
  - <known reusable facet not represented by this record>

# Optional: terms needed to resolve source vocabulary.
aliases:
  - <source term or public symbol>

# State each mandatory fact once. Suggested kinds include semantic,
# public_surface, prohibition, lifecycle, system_effect, persistence,
# reconfiguration, compatibility, and verification.
requirements:
  - id: <stable-short-rule-id>
    kind: <kind>
    statement: >-
      <Required contract statement.>
    sources:
      - <source-alias>
    # Add only for a necessary consequence rather than a direct statement.
    # basis: derived

# Keep only for normative SHOULD/SHOULD NOT guidance.
recommendations:
  - id: <stable-short-rule-id>
    statement: >-
      <Recommended contract statement.>
    sources:
      - <source-alias>

# List only freedoms worth making explicit to prevent unsupported commitments.
implementation_freedom:
  - <Unconstrained implementation choice>

# Empty is acceptable only after checking for unresolved observable behavior.
open_questions: []

# Define each source once and cite aliases above.
sources:
  <source-alias>:
    document: docs/specs/<specification>.md
    heading_path:
      - <top-level heading text>
      - <exact nested heading text>
    # Add only after independent review; task preparation must not add or refresh it.
    # reviewed_hash: sha256:<normalized-section-sha256>
    authority: <Optional short explanation; delete if obvious>
