schema_version: "0.1"
id: mossignal.diagnostics.problem_model
title: Catalogue-backed diagnostic problem model
kind: family
status: reviewed

source_baseline:
  commit: 6b64c04ec050d7319473a0cd5a5bfea0d74d18c4
  working_tree: clean

summary: >-
  A Problem<D> is the common owned, structured account of one catalogue-defined
  condition, with fixed classification, stable subjects, exact typed evidence,
  and machine-readable suggestions independent of delivery and rendering.

scope:
  includes:
    - diagnostic codes and their authoritative registry
    - severity, responsibility, subject attachment, typed evidence, and suggestions
    - Problem<D> and the report-finding Diagnostic<D> wrapper
  excludes:
    - SubjectRef identity and canonical ordering
    - deterministic collection, deduplication, and evidence merging
    - artifact-bearing reports
    - runtime occurrences, persistent episodes, and internal-defect delivery
    - rendering, localization, logging, persistence, and provenance

aliases:
  - DiagnosticCode
  - Problem<D>
  - ProblemEvidence<D>
  - Diagnostic<D>
  - Severity
  - Responsibility

requirements:
  - id: code-condition
    kind: semantic
    statement: >-
      A diagnostic code names one semantic condition rather than a message,
      call site, API method, Rust wrapper, or presentation choice, and its
      lowercase dotted segments must satisfy [a-z][a-z0-9_]*.
    sources: [catalogue-codes]

  - id: experimental-schema
    kind: compatibility
    statement: >-
      The diagnostic schema is experimental: coordinated schema revisions may
      change codes, evidence, classifications, and organization until an explicit
      future stabilization, while current tests and tools still use structured
      codes rather than prose.
    sources: [catalogue-schema]

  - id: authoritative-registry
    kind: public_surface
    statement: >-
      Catalogue entries must be represented once in an authoritative declarative
      registry that supplies each code's string, schema introduction, severity,
      responsibility, delivery forms, report blocking behavior, subject rules,
      condition discriminator, exact evidence association, suggestions, lifecycle
      behavior, persistence participation, and documentation identity; duplicate
      hand-maintained mappings are prohibited.
    sources: [catalogue-registry]

  - id: fixed-classification
    kind: semantic
    statement: >-
      Severity is exactly Info, Warning, or Error and responsibility is exactly
      Advisory, CallerInput, SemanticRejection, Compatibility, ResourceLimit,
      CorruptData, UnsupportedFeature, ExternalIntegration, or LibraryDefect;
      both are fixed by code and cannot be selected by an emitter.
    sources: [catalogue-problem, catalogue-severity, catalogue-responsibility]

  - id: complete-problem
    kind: public_surface
    statement: >-
      Problem<D> must own and expose its code, fixed severity, fixed responsibility,
      primary SubjectRef, typed related subjects, code-specific ProblemEvidence<D>,
      and machine-readable suggestions. These distinctions are normative even if
      the exact private representation differs.
    sources: [catalogue-problem, concrete-problems]

  - id: safe-valid-combinations
    kind: prohibition
    statement: >-
      Safe construction must not permit an invalid code/evidence, classification,
      or delivery combination; dynamic decoding may construct a problem only after
      checking the combination against the catalogue.
    sources: [catalogue-problem, concrete-problems]

  - id: exact-typed-evidence
    kind: public_surface
    statement: >-
      ProblemEvidence<D> is a closed typed family with one exact code-specific
      variant per catalogue code, even when variants share payload
      records; an untyped string map is not the canonical representation.
    sources: [catalogue-evidence, concrete-problems]

  - id: useful-evidence
    kind: semantic
    statement: >-
      Evidence must identify materially involved stable subjects and contain
      enough structured information to understand and, where practical, reproduce
      and regression-test the condition without parsing prose; private pointers
      and unstable dense positions cannot be authoritative identity.
    sources: [catalogue-evidence]

  - id: suggestion-safety
    kind: prohibition
    statement: >-
      Suggestions are closed machine-readable actions and may be attached only
      when the correction is unambiguous; the library must not encode one arbitrary
      choice when materially different corrections are possible.
    sources: [catalogue-suggestions]

  - id: report-finding-wrapper
    kind: public_surface
    statement: >-
      Diagnostic<D> is the owned report-finding wrapper around Problem<D>, exposes
      borrowed and consuming problem access, and accepts only codes whose registry
      entry permits ReportFinding delivery.
    sources: [concrete-problems]

  - id: prose-derived
    kind: prohibition
    statement: >-
      Rendered summaries, localized messages, and Display output are derived
      presentation and must not be authoritative fields or determine handling.
    sources: [concrete-problems, catalogue-unified]

  - id: registry-conformance
    kind: verification
    statement: >-
      Verification must establish complete one-to-one registry coverage for public
      leaf failures, report-producing validation rules, runtime conditions, and
      named internal invariants; every code must have exactly one classification,
      evidence schema, condition discriminator, and allowed delivery set, and safe
      APIs must not construct mismatched combinations.
    sources: [catalogue-completeness]

  - id: structured-comparison
    kind: verification
    statement: >-
      Tests must compare the authoritative structured problem fields and exclude
      rendered prose from semantic equality.
    sources: [catalogue-structural, testing-conformance]

  - id: suggestion-conformance
    kind: verification
    statement: >-
      Tests must verify that machine-readable suggestions are absent when a
      correction is ambiguous.
    sources: [catalogue-suggestions, testing-report]

  - id: golden-catalogue
    kind: verification
    statement: >-
      CI must deterministically generate or validate code and evidence variants,
      failure mappings, reference documentation, canonical persisted vectors,
      editor schema data, and code ownership and delivery tables.
    sources: [catalogue-golden]

recommendations:
  - id: private-fields
    statement: >-
      Problem<D> fields should remain private to prevent arbitrary invalid
      combinations.
    sources: [concrete-problems]
  - id: non-exhaustive-evidence
    statement: >-
      Public problem-evidence enums should remain non-exhaustive while the
      diagnostic schema is experimental.
    sources: [concrete-non-exhaustive]

implementation_freedom:
  - The generated spelling and module placement of code constants and evidence variants are deferred.
  - Reusable payload records may be shared while retaining exact public code-to-variant association.
  - A generic schema projection may exist for tooling but cannot replace the typed canonical model.

open_questions: []

